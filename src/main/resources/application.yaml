spring:
  application:
    name: media-timeline-service

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://${DB_POSTGRES_HOST:localhost}:${DB_POSTGRES_PORT:5432}/${DB_POSTGRES_NAME:media_db}
    username: ${DB_POSTGRES_USER:media_user}
    password: ${DB_POSTGRES_PASS:media_secure_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # JPA & Hibernate 7.x Settings
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Schema managed by init.sql
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Cassandra Configuration
  cassandra:
    keyspace-name: media_timeline
    contact-points: ${DB_CASSANDRA_HOST:localhost}
    port: ${DB_CASSANDRA_PORT:9042}
    local-datacenter: datacenter1
    schema-action: none  # Schema managed by init.cql

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://${DB_MONGO_HOST:localhost}:${DB_MONGO_PORT:27017}/${DB_MONGO_NAME:media_db}?replicaSet=rs0

  # Spring Boot API Versioning
  mvc:
    apiversion:
      supported: "1.0, 2.0, 3.0"
      default: "1.0"
      use:
        path-segment: 1

server:
  port: 8080